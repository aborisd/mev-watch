name: mev-watch

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ingester:
    build: ./backend
    restart: unless-stopped
    command: ["python", "-m", "mev_watch.ingester"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  detector:
    build: ./backend
    restart: unless-stopped
    command: ["python", "-m", "mev_watch.detector"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ./backend
    restart: unless-stopped
    command: ["python", "-m", "mev_watch.api"]
    env_file: .env
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./frontend
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
    depends_on:
      - api
      - web

volumes:
  pgdata:
  caddy_data:
  caddy_config:
